name: Build & Deploy

# Build the bot image, push to Docker Hub, then deploy on the VPS by pulling the
# new tag (via ansible-library). This repo needs DOCKERHUB_TOKEN + ANSIBLE_VAULT_PASSWORD.

on:
  push:
    branches: [master]
    paths:
      - "telegram-bot/**"
      - "ctrader-engine/**"
      - "docs/redis-contract.md"
      - "deployment-template/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  release:
    uses: st-mich43l/action-library/.github/workflows/build-push-deploy.yml@master
    with:
      project: apexvoid-trading-bot
      registry-namespace: mich43l
      images: >-
        [
          {"name": "apexvoid-trading-bot", "context": "telegram-bot", "dockerfile": "telegram-bot/Dockerfile"},
          {"name": "apexvoid-ctrader-engine", "context": "ctrader-engine", "dockerfile": "ctrader-engine/Dockerfile"}
        ]
    secrets:
      registry-token: ${{ secrets.DOCKERHUB_TOKEN }}
      vault-password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
