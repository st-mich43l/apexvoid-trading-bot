name: apexvoid-trading-bot

x-auto-trade-environment: &auto-trade-environment
  AUTO_TRADE_PROFILE: ${AUTO_TRADE_PROFILE:-demo_eval}
  AUTO_TRADE_ENABLED: ${AUTO_TRADE_ENABLED:-true}
  AUTO_TRADE_DRY_RUN: ${AUTO_TRADE_DRY_RUN:-false}
  AUTO_TRADE_REQUIRE_DEMO_ACCOUNT: ${AUTO_TRADE_REQUIRE_DEMO_ACCOUNT:-true}
  AUTO_TRADE_CANDIDATE_STREAM: ${AUTO_TRADE_CANDIDATE_STREAM:-auto_trade:candidates}
  AUTO_TRADE_EVENT_STREAM: ${AUTO_TRADE_EVENT_STREAM:-auto_trade:events}
  AUTO_TRADE_CANDIDATE_CONTRACT_VERSION: ${AUTO_TRADE_CANDIDATE_CONTRACT_VERSION:-5}
  AUTO_TRADE_SYMBOLS: ${AUTO_TRADE_SYMBOLS:-XAU}
  AUTO_TRADE_CANONICAL_SYMBOL: ${AUTO_TRADE_CANONICAL_SYMBOL:-XAU}
  AUTO_TRADE_XAU_PIP_SIZE: ${AUTO_TRADE_XAU_PIP_SIZE:-0.1}
  AUTO_TRADE_XAU_CONTRACT_SIZE: ${AUTO_TRADE_XAU_CONTRACT_SIZE:-100}
  AUTO_TRADE_TARGET_PLANS_PIPS: ${AUTO_TRADE_TARGET_PLANS_PIPS:-30,60,90,120,200}
  AUTO_TRADE_RANGE_TARGETS_PIPS: ${AUTO_TRADE_RANGE_TARGETS_PIPS:-20,30,40,50,70}
  AUTO_TRADE_RANGE_TP_BUFFER_PIPS: ${AUTO_TRADE_RANGE_TP_BUFFER_PIPS:-3}
  AUTO_TRADE_CANDIDATE_MAX_AGE_SECONDS: ${AUTO_TRADE_CANDIDATE_MAX_AGE_SECONDS:-420}
  AUTO_TRADE_CANDIDATE_STORAGE_TTL_SECONDS: ${AUTO_TRADE_CANDIDATE_STORAGE_TTL_SECONDS:-604800}
  AUTO_TRADE_SPOT_MAX_AGE_SECONDS: ${AUTO_TRADE_SPOT_MAX_AGE_SECONDS:-5}
  AUTO_TRADE_RANGE_FLIP_ENABLED: ${AUTO_TRADE_RANGE_FLIP_ENABLED:-true}
  AUTO_TRADE_RANGE_TWO_SIDED_ENABLED: ${AUTO_TRADE_RANGE_TWO_SIDED_ENABLED:-true}
  AUTO_TRADE_ALLOW_CONCURRENT_STRATEGIES: ${AUTO_TRADE_ALLOW_CONCURRENT_STRATEGIES:-true}
  AUTO_TRADE_ALLOW_COUNTER_BIAS: ${AUTO_TRADE_ALLOW_COUNTER_BIAS:-true}
  AUTO_TRADE_ZONE_FILL_ENABLED: ${AUTO_TRADE_ZONE_FILL_ENABLED:-true}
  AUTO_TRADE_MIN_CONFLUENCE: ${AUTO_TRADE_MIN_CONFLUENCE:-2}
  AUTO_TRADE_NON_HEDGED_OPPOSITE_POLICY: ${AUTO_TRADE_NON_HEDGED_OPPOSITE_POLICY:-broker_netting}
  AUTO_TRADE_STRUCTURAL_GUARD_MODE: ${AUTO_TRADE_STRUCTURAL_GUARD_MODE:-observe}
  AUTO_TRADE_ZONE_COOLDOWN_ENABLED: ${AUTO_TRADE_ZONE_COOLDOWN_ENABLED:-false}
  AUTO_TRADE_ZONE_RECONCILE_MODE: ${AUTO_TRADE_ZONE_RECONCILE_MODE:-shadow}
  AUTO_TRADE_RANGE_MIN_ENTRY_DRIFT_PIPS: ${AUTO_TRADE_RANGE_MIN_ENTRY_DRIFT_PIPS:-10}
  AUTO_TRADE_MAP_MIN_ENTRY_DRIFT_PIPS: ${AUTO_TRADE_MAP_MIN_ENTRY_DRIFT_PIPS:-10}
  AUTO_TRADE_TREND_MIN_ENTRY_DRIFT_PIPS: ${AUTO_TRADE_TREND_MIN_ENTRY_DRIFT_PIPS:-15}
  AUTO_TRADE_RANGE_MAX_ENTRY_DRIFT_ATR: ${AUTO_TRADE_RANGE_MAX_ENTRY_DRIFT_ATR:-1.0}
  AUTO_TRADE_MAP_MAX_ENTRY_DRIFT_ATR: ${AUTO_TRADE_MAP_MAX_ENTRY_DRIFT_ATR:-1.0}
  AUTO_TRADE_TREND_MAX_ENTRY_DRIFT_ATR: ${AUTO_TRADE_TREND_MAX_ENTRY_DRIFT_ATR:-1.5}
  AUTO_TRADE_RANGE_HARD_ENTRY_DRIFT_PIPS: ${AUTO_TRADE_RANGE_HARD_ENTRY_DRIFT_PIPS:-20}
  AUTO_TRADE_MAP_HARD_ENTRY_DRIFT_PIPS: ${AUTO_TRADE_MAP_HARD_ENTRY_DRIFT_PIPS:-20}
  AUTO_TRADE_TREND_HARD_ENTRY_DRIFT_PIPS: ${AUTO_TRADE_TREND_HARD_ENTRY_DRIFT_PIPS:-30}
  AUTO_TRADE_MAPPED_ZONE_ENABLED: ${AUTO_TRADE_MAPPED_ZONE_ENABLED:-false}
  AUTO_TRADE_KEY_LEVEL_REACTION_ENABLED: ${AUTO_TRADE_KEY_LEVEL_REACTION_ENABLED:-true}
  AUTO_TRADE_DEMAND_REACTION_ENABLED: ${AUTO_TRADE_DEMAND_REACTION_ENABLED:-true}
  AUTO_TRADE_SUPPLY_REACTION_ENABLED: ${AUTO_TRADE_SUPPLY_REACTION_ENABLED:-true}
  AUTO_TRADE_SESSION_LEVEL_REACTION_ENABLED: ${AUTO_TRADE_SESSION_LEVEL_REACTION_ENABLED:-true}
  AUTO_TRADE_TRENDLINE_REACTION_ENABLED: ${AUTO_TRADE_TRENDLINE_REACTION_ENABLED:-true}
  AUTO_TRADE_STRUCTURAL_REACTION_LOOKBACK_BARS: ${AUTO_TRADE_STRUCTURAL_REACTION_LOOKBACK_BARS:-3}
  AUTO_TRADE_MAP_REACTION_LOOKBACK_BARS: ${AUTO_TRADE_MAP_REACTION_LOOKBACK_BARS:-5}
  AUTO_TRADE_MAP_REACTION_REARM_BARS: ${AUTO_TRADE_MAP_REACTION_REARM_BARS:-3}
  AUTO_TRADE_MAP_REACTION_REARM_ATR: ${AUTO_TRADE_MAP_REACTION_REARM_ATR:-0.50}
  AUTO_TRADE_MAP_THESIS_LOCK_ENABLED: ${AUTO_TRADE_MAP_THESIS_LOCK_ENABLED:-true}

services:
  postgres:
    image: postgres:17-alpine
    container_name: apexvoid-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apexvoid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apexvoid}
      POSTGRES_DB: ${POSTGRES_DB:-signals}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apexvoid} -d ${POSTGRES_DB:-signals}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No ports exposed — only the bot on the internal network reaches it.

  redis:
    image: redis:7-alpine
    container_name: apexvoid-trading-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    # redisdata holds the rotated live cTrader refresh token; each rotation
    # invalidates the previous token. The host file mirror recovers Redis loss,
    # but destroying both requires manual cTrader Playground re-authorisation.

  bot:
    build: ./telegram-bot
    image: apexvoid-trading-bot:latest
    container_name: apexvoid-trading-bot
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *auto-trade-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data   # calendar cache (ff_*.json) still persists here
    # No ports exposed — the bot uses outbound Telegram long-polling only.

  ctrader-engine:
    build: ./ctrader-engine
    image: apexvoid-ctrader-engine:latest
    container_name: apexvoid-ctrader-engine
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *auto-trade-environment
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/ctrader-token:/var/lib/apexvoid
    healthcheck:
      test: ["CMD", "/app/ctrader-feed", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    # No ports exposed — outbound cTrader TLS + internal Redis only.

volumes:
  pgdata:
  redisdata:
